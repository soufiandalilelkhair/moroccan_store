<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أصالة الفخار المغربي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div id="preloader"><div class="loader-logo"><h1>أصالة الفخار</h1><span>ASALAT AL FAKHAR</span></div></div>
<header id="header"><nav class="navbar">
<div class="logo"><h2 data-i18n="hero.title">أصالة الفخار</h2></div>
<ul class="nav-links">
<li><a href="#home" data-i18n="navbar.home">الرئيسية</a></li>
<li><a href="#about" data-i18n="navbar.about">من نحن</a></li>
<li><a href="#categories" data-i18n="navbar.categories">التصنيفات</a></li>
<li><a href="#products" data-i18n="navbar.products">المنتجات</a></li>
<li><a href="#contact" data-i18n="navbar.contact">اتصل بنا</a></li>
</ul>
<div class="nav-actions">
<button id="themeBtn" class="icon-btn"><i class="fas fa-moon"></i></button>
<button id="languageBtn" class="icon-btn"><i class="fas fa-globe"></i></button>
<a class="icon-btn"><i class="fas fa-heart"></i><span id="favorites-count">0</span></a>
<a class="icon-btn"><i class="fas fa-shopping-cart"></i><span id="cart-count">0</span></a>
<div id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
</div></nav></header>
<div id="mobileMenu"></div>
<input id="searchInput" placeholder="ابحث عن منتج...">
<section class="hero" id="home"><div class="hero-overlay"></div><div class="hero-content">
<h1 data-i18n="hero.title">أصالة الفخار المغربي</h1>
<p data-i18n="hero.description">اكتشف أجمل منتجات الفخار المغربي.</p>
</div></section>
<section id="about" class="about-section"><div class="container"><h2 data-i18n="about.title">من نحن</h2></div></section>
<section id="categories" class="categories-section"><div class="container"><h2 data-i18n="categories.title">التصنيفات</h2></div></section>
<section id="products" class="featured-products"><div class="container"><div class="products-grid">
<div class="product-card"><div class="product-image"><img src="https://picsum.photos/500"></div><div class="product-info">
<h3>منتج تجريبي</h3><div class="price">150 DH</div>
<button class="btn btn-primary" onclick="addToCart({id:1,name:'منتج تجريبي',price:150,image:'https://picsum.photos/500'})">إضافة للسلة</button>
<button class="wishlist-btn" data-id="1" data-name="منتج تجريبي" data-price="150" data-image="https://picsum.photos/500">❤</button>
</div></div></div></div></section>
<div id="orderModal" class="order-modal"><div class="order-box">
<span class="close-modal" onclick="closeOrderModal()">&times;</span>
<div id="orderSummary"></div>
<input id="firstName"><input id="phone"><input id="city"><textarea id="address"></textarea>
<button onclick="sendOrderWhatsApp()">إرسال الطلب</button>
</div></div>
<footer id="contact"><div class="container"><p data-i18n="footer.rights">جميع الحقوق محفوظة</p></div></footer>
<script src="lang.js"></script>
<script src="main.js"></script>
</body></html>
