
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتجات أصالة الفخار المغربي</title>

<style>

body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#f5f3ef;
}

.page-title{
    text-align:center;
    padding:40px 0;
    color:#c89b3c;
    font-size:45px;
}

.products-grid{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
    padding-bottom:50px;
}

.product-card{
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-8px);
}

.product-image{
    height:320px;
    overflow:hidden;
}

.product-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.product-info{
    padding:25px;
    text-align:center;
}

.product-info h3{
    font-size:32px;
    margin-bottom:15px;
    color:#1f2937;
}

.price{
    color:#c89b3c;
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
}

.btn{
    background:#c89b3c;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
}

.btn:hover{
    opacity:.9;
}

</style>
</head>

<body>

<h1 class="page-title">منتجاتنا</h1>

<div class="products-grid">

    <div class="product-card">

        <div class="product-image">
            <img src="imagine/poterie1.jpg" alt="مزهرية مغربية">
        </div>

        <div class="product-info">
            <h3>مزهرية مغربية</h3>
            <p class="price">390 درهم</p>

            <button class="btn"
            onclick="addToCart({
                id:1,
                name:'مزهرية مغربية',
                price:390,
                image:'imagine/poterie1.jpg'
            })">
                أضف إلى السلة
            </button>

        </div>

    </div>

    <div class="product-card">

        <div class="product-image">
            <img src="imagine/tabsil.png" alt="صحن مزخرف">
        </div>

        <div class="product-info">
            <h3>صحن مزخرف</h3>
            <p class="price">320 درهم</p>

            <button class="btn"
            onclick="addToCart({
                id:2,
                name:'صحن مزخرف',
                price:320,
                image:'imagine/tabsil.png'
            })">
                أضف إلى السلة
            </button>

        </div>

    </div>

    <div class="product-card">

        <div class="product-image">
            <img src="imagine/tajine.png" alt="طاجين فاخر">
        </div>

        <div class="product-info">
            <h3>طاجين فاخر</h3>
            <p class="price">450 درهم</p>

            <button class="btn"
            onclick="addToCart({
                id:3,
                name:'طاجين فاخر',
                price:450,
                image:'imagine/tajine.png'
            })">
                أضف إلى السلة
            </button>

        </div>

    </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
