<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سلة المشتريات | أصالة الفخار المغربي</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="cart-page">

    <div class="cart-header">

        <h1>🛒 سلة المشتريات</h1>

        <p>راجع منتجاتك ثم اضغط على إتمام الطلب.</p>

    </div>

    <div id="cartContainer">

    </div>

</div>

<!-- نافذة معلومات العميل -->
<div id="orderModal" class="order-modal">

    <div class="order-box">

        <span class="close-modal"
        onclick="closeOrderModal()">

            &times;

        </span>

        <h2>

            معلومات العميل

        </h2>

        <p class="order-subtitle">

            المرجو إدخال معلومات التوصيل

        </p>

        <div class="input-group">

            <label>

                الاسم الكامل *

            </label>

            <input
            id="firstName"
            type="text"
            placeholder="أدخل اسمك الكامل">

        </div>

        <div class="input-group">

            <label>

                رقم الهاتف *

            </label>

            <input
            id="phone"
            type="tel"
            placeholder="06xxxxxxxx">

        </div>

        <div class="input-group">

            <label>

                المدينة *

            </label>

            <input
            id="city"
            type="text"
            placeholder="أدخل المدينة">

        </div>

        <div class="input-group">

            <label>

                العنوان الكامل *

            </label>

            <textarea
            id="address"
            placeholder="الحي - الشارع - رقم المنزل ...">
            </textarea>

        </div>

        <div id="orderSummary">

        </div>

        <button
        class="confirm-order-btn"
        onclick="sendOrderWhatsApp()">

            <i class="fa-brands fa-whatsapp"></i>

            تأكيد الطلب عبر واتساب

        </button>

    </div>

</div>

<script src="main.js"></script>

<script>

renderCart();

function renderCart(){

const container =
document.getElementById("cartContainer");

const cart =
JSON.parse(localStorage.getItem("cart")) || [];

if(cart.length===0){

container.innerHTML=`

<div class="empty-cart">

<i class="fa-solid fa-cart-shopping"></i>

<h2>

السلة فارغة

</h2>

</div>

`;

return;

}

let total=0;

let html="";

cart.forEach(item=>{

total+=item.price*item.quantity;

html+=`

<div class="cart-item">

<div class="cart-image">

<img src="${item.image}">

</div>

<div class="cart-info">

<h3>${item.name}</h3>

<div class="price">

${item.price} درهم

</div>

</div>

<div class="cart-qty">

<button onclick="increaseQuantity(${item.id});setTimeout(renderCart,100)">+</button>

<span>${item.quantity}</span>

<button onclick="decreaseQuantity(${item.id});setTimeout(renderCart,100)">-</button>

</div>

<button class="remove-btn"

onclick="removeCartItem(${item.id});setTimeout(renderCart,100)">

حذف

</button>

</div>

`;

});
container.innerHTML = html + `

<div class="cart-summary">

    <div class="total">

        المجموع :

        ${total} درهم

    </div>

    <div class="actions">

        <button
        class="checkout-btn"
        onclick="openOrderModal()">

            <i class="fa-solid fa-circle-check"></i>

            إتمام الطلب

        </button>

        <button
        class="clear-btn"
        onclick="
        clearCart();
        renderCart();
        ">

            <i class="fa-solid fa-trash"></i>

            تفريغ السلة

        </button>

    </div>

</div>

`;

}

</script>

</body>

</html>
